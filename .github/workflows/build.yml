name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm run build
      - run: npm run verify
      - run: npm run archive
      - run: brew style Casks/netron-quicklook.rb
      - uses: actions/upload-artifact@v4
        with:
          name: NetronQuickLook-unsigned
          path: dist/NetronQuickLook-*.zip
