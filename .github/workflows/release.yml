name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN="$RUNNER_TEMP/netron-quicklook.keychain-db"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      - name: Build and verify
        run: |
          npm run build
          npm run verify

      - name: Notarize and staple
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          APP="dist/Netron Quick Look.app"
          NOTARY_ARCHIVE="$RUNNER_TEMP/NetronQuickLook-notary.zip"
          API_KEY="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$API_KEY"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$NOTARY_ARCHIVE"
          xcrun notarytool submit "$NOTARY_ARCHIVE" --key "$API_KEY" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID" --wait
          xcrun stapler staple "$APP"
          codesign --verify --deep --strict "$APP"
          spctl --assess --type execute --verbose "$APP"

      - name: Publish release archive
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="$(npm run --silent archive)"
          SHA256="$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          gh release create "$GITHUB_REF_NAME" "$ARCHIVE" --generate-notes --verify-tag

      - name: Update tap cask
        env:
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git fetch origin "$DEFAULT_BRANCH"
          git switch "$DEFAULT_BRANCH"
          git pull --ff-only origin "$DEFAULT_BRANCH"
          node scripts/update-cask.js --repository "$GITHUB_REPOSITORY" --sha256 "$SHA256" --version "$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/netron-quicklook.rb
          git commit -m "netron-quicklook $VERSION"
          git push origin "$DEFAULT_BRANCH"
